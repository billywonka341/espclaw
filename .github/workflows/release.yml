name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO Core and Dependencies
        run: pip install --upgrade platformio intelhex

      - name: Create dummy config.h for ESP8266
        run: |
          cat <<EOF > src/config.h
          #ifndef CONFIG_H
          #define CONFIG_H
          #define WIFI_SSID "dummy_ssid"
          #define WIFI_PASSWORD "dummy_pass"
          #define TELEGRAM_BOT_TOKEN "dummy_token"
          #define TELEGRAM_ALLOWED_CHAT_ID "dummy_id"
          #define OPENAI_API_KEY "dummy_key"
          #define POLLING_INTERVAL_MS 1000
          #define LLM_PROVIDER "openai"
          #define LLM_MODEL "gpt-3.5-turbo"
          #define SYSTEM_PROMPT "dummy prompt"
          #define USER_PINS ""
          #define MULTI_ESP_ENABLED false
          #define DEVICE_ID ""
          #endif
          EOF

      - name: Build Firmwares
        run: |
          pio run -e d1_mini
          pio run -e nodemcuv2
          pio run -e esp32dev
          pio run -e esp32-c3
          pio run -e esp32-s3
          pio run -e esp32-s2

      - name: Package Release Files
        run: |
          mkdir -p release_assets
          # ESP8266 Assets
          cp .pio/build/d1_mini/firmware.bin release_assets/espclaw-esp8266-d1_mini.bin
          cp .pio/build/nodemcuv2/firmware.bin release_assets/espclaw-esp8266-nodemcuv2.bin
          
          # ESP32 Assets (Requires bootloader, partitions, and firmware)
          cp .pio/build/esp32dev/firmware.bin release_assets/espclaw-esp32dev-firmware.bin
          cp .pio/build/esp32dev/partitions.bin release_assets/espclaw-esp32dev-partitions.bin
          cp .pio/build/esp32dev/bootloader.bin release_assets/espclaw-esp32dev-bootloader.bin
          
          cp .pio/build/esp32-c3/firmware.bin release_assets/espclaw-esp32-c3-firmware.bin
          cp .pio/build/esp32-c3/partitions.bin release_assets/espclaw-esp32-c3-partitions.bin
          cp .pio/build/esp32-c3/bootloader.bin release_assets/espclaw-esp32-c3-bootloader.bin
          
          cp .pio/build/esp32-s3/firmware.bin release_assets/espclaw-esp32-s3-firmware.bin
          cp .pio/build/esp32-s3/partitions.bin release_assets/espclaw-esp32-s3-partitions.bin
          cp .pio/build/esp32-s3/bootloader.bin release_assets/espclaw-esp32-s3-bootloader.bin
          
          cp .pio/build/esp32-s2/firmware.bin release_assets/espclaw-esp32-s2-firmware.bin
          cp .pio/build/esp32-s2/partitions.bin release_assets/espclaw-esp32-s2-partitions.bin
          cp .pio/build/esp32-s2/bootloader.bin release_assets/espclaw-esp32-s2-bootloader.bin
          
          cd release_assets
          # Create a zip containing all binaries for easy downloading
          zip -r espclaw-release-binaries.zip *

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          name: espclaw ${{ github.ref_name }}
          body: |
            ## 🚀 espclaw ${{ github.ref_name }} is here!
            
            The smartest, smallest AI personal assistant designed to run on incredibly constrained hardware (ESP8266) while seamlessly scaling up to powerful capabilities on the ESP32.
            
            ### ✨ Features in this release
            - **� Multi-ESP Grouping**: Easily manage multiple espclaw devices in a single Telegram chat via unique `Device IDs` and new commands like `/setup`, `/multiespclaw`, and `/changegpiodescription`!
            - **�🔌 Dynamic Hardware Control**: The AI now natively understands the physical pins of your specific board (e.g. D4 vs GPIO 2).
            - **🎛️ Web UI Configurable Pins**: You can now define exactly what hardware is connected to what pin (like fans or relays) directly in the WebUI so the Telegram AI knows exactly what to control!
            - **ESP32 Web UI Overhaul**: New built-in "Logs" interface that captures API traces in real-time.
            - **2026 Enterprise Models**: Explicit support added for the latest 2026 models like `gpt-5.2`, `claude-opus-4-6`, and `gemini-3-flash-preview` straight from the UI.
            - **cURL API Tracing**: The device now automatically synthesizes and logs the formatted `curl` command it sends for your debugging convenience.
            - **Broader AI Personas**: The system prompts have been expanded so the AI will not only control hardware but gracefully answer general knowledge questions.
            - **ESP8266 Port**: Fully optimized streaming ArduinoJson parsers and BearSSL integration to run within ~80KB RAM!
            
            ### 📥 Installation
            Download the `espclaw-release-binaries.zip` below or the individual firmwares for your board.
            Check the [README.md](https://github.com/billywonka341/espclaw/blob/main/README.md) for full flashing and setup instructions!
          files: |
            release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
